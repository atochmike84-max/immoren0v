html,body{height:100%;overflow:hidden;font-family:'DM Sans',system-ui,sans-serif;background:#0e1016;color:#f0f0f0}
:root{

::-webkit-scrollbar{width:4px;height:4px}

/* LAYOUT */

.page{display:none;flex-direction:column;height:100%;overflow:hidden}

.tb{flex:0 0 auto;padding:11px 13px;border:none;background:none;color:var(--t4);font-size:12px;font-weight:500;font-family:inherit;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s}
.tb.on{color:var(--gold);border-bottom-color:var(--gold);font-weight:700;background:rgba(201,169,110,.06)}

.card{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:18px 20px;margin-bottom:12px}

.btn-g{background:var(--bg3);border:none;border-radius:var(--rs);color:var(--t3);font-size:12px;padding:7px 12px;cursor:pointer;font-family:inherit}

.btn-o{background:none;border:1px solid var(--bd);border-radius:var(--rs);color:var(--t3);font-size:11px;padding:5px 10px;cursor:pointer;font-family:inherit}
.btn-full{width:100%;padding:14px;font-size:15px;border-radius:12px}

/* TAG */

/* FORM */

.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}

// ═══ CRYPTO ═══════════════════════════════════════════════
async function deriveKey(pw) {
  const e=new TextEncoder();
  const km=await crypto.subtle.importKey('raw',e.encode(pw),'PBKDF2',false,['deriveKey']);
  return crypto.subtle.deriveKey(
    {name:'PBKDF2',salt:e.encode('immoren0v-salt-v2'),iterations:100000,hash:'SHA-256'},
    km,{name:'AES-GCM',length:256},false,['encrypt','decrypt']
  );
}
async function aesEnc(data,key){
  const iv=crypto.getRandomValues(new Uint8Array(12));
  const ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},key,new TextEncoder().encode(JSON.stringify(data)));
  const out=new Uint8Array(12+ct.byteLength);out.set(iv);out.set(new Uint8Array(ct),12);
  return btoa(String.fromCharCode(...out));
}
async function aesDec(b64,key){
  try{
    const b=new Uint8Array([...atob(b64)].map(c=>c.charCodeAt(0)));
    const d=await crypto.subtle.decrypt({name:'AES-GCM',iv:b.slice(0,12)},key,b.slice(12));
    return JSON.parse(new TextDecoder().decode(d));
  }catch{return null;}
}

function addLog(action){
  if(!curId)return;
  const p=P();if(!p)return;
  p.activityLog=p.activityLog||[];
  p.activityLog.push({user:SES?.username,action,ts:Date.now()});
  if(p.activityLog.length>80)p.activityLog=p.activityLog.slice(-80);
}

// ═══ FIREBASE ═════════════════════════════════════════════
function setSync(s,id='sync-txt'){
  const el=document.getElementById(id);if(!el)return;
  const c={idle:['#2ecc71','● Sync'],saving:['#f39c12','↑ ...'],saved:['#2ecc71','✓ OK'],error:['#e74c3c','⚠ Err'],local:['#888','◌ Local']};
  const[col,txt]=c[s]||c.idle;el.style.color=col;el.textContent=txt;
}
async function save(){
  if(!window._fbOK||!SES){setSync('local');setSync('local','pf-sync');return;}
  setSync('saving');
  try{
    const enc=await aesEnc(STATE,SES.cryptoKey);
    const{doc,setDoc,serverTimestamp}=window._fb;
    await setDoc(doc(window._db,'projects',SES.projectId),{data:enc,updatedAt:serverTimestamp(),updatedBy:SES.username});
    lastSaved=JSON.stringify(STATE);
    setSync('saved');setSync('saved','pf-sync');
    setTimeout(()=>{setSync('idle');setSync('idle','pf-sync');},2000);
  }catch{setSync('error');}
}
function scheduleSave(){clearTimeout(saveTimer);saveTimer=setTimeout(save,900);}

function startListener(){
  if(!window._fbOK||!SES)return;
  const{doc,onSnapshot}=window._fb;
  if(fbUnsub)fbUnsub();
  fbUnsub=onSnapshot(doc(window._db,'projects',SES.projectId),async snap=>{
    if(!snap.exists())return;
    const d=await aesDec(snap.data().data,SES.cryptoKey);
    if(!d)return;
    const s=JSON.stringify(d);if(s===lastSaved)return;
    lastSaved=s;STATE=d;
    renderPortfolio();if(curId)renderTab(curTab);
    setSync('saved');setTimeout(()=>setSync('idle'),2000);
  },()=>setSync('error'));
}
function startPresence(){
  if(!window._fbOK||!SES)return;
  const{doc,setDoc,collection,getDocs}=window._fb;
  const beat=()=>setDoc(doc(window._db,'projects',SES.projectId,'presence',SES.username),{username:SES.username,ts:Date.now(),online:true}).catch(()=>{});
  beat();presIv=setInterval(beat,20000);
  const read=async()=>{
    try{
      const snap=await getDocs(collection(window._db,'projects',SES.projectId,'presence'));
      const now=Date.now(),us=[];
      snap.forEach(d=>{const x=d.data();if(x.online&&now-x.ts<40000)us.push(x.username);});
      const el=document.getElementById('online-users');if(!el)return;
      el.innerHTML=us.map(u=>`<span style="color:${u===SES.username?'#2ecc71':'#3498db'};font-size:11px">● ${u}${u===SES.username?' (vous)':''}</span>`).join('');
    }catch{}
  };
  read();onIv=setInterval(read,15000);
}

document.getElementById('eye-btn').onclick=()=>{
  const i=document.getElementById('l-code');
  i.type=i.type==='password'?'text':'password';
  document.getElementById('eye-btn').textContent=i.type==='password'?'👁':'🙈';
};
document.getElementById('l-btn').onclick=doLogin;
['l-name','l-proj','l-code'].forEach(id=>document.getElementById(id).addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();}));

async function doLogin(){
  const name=document.getElementById('l-name').value.trim();
  const pid=document.getElementById('l-proj').value.trim().toLowerCase().replace(/\s+/g,'-');
  const code=document.getElementById('l-code').value;
  const err=document.getElementById('l-err');err.style.display='none';
  if(!name){showErr('Entrez votre prénom.');return;}
  if(!pid){showErr("Entrez un ID de projet.");return;}
  if(code.length<6){showErr('Code minimum 6 caractères.');return;}
  const btn=document.getElementById('l-btn');btn.textContent='Connexion...';btn.disabled=true;
  try{
    const cryptoKey=await deriveKey(code);
    if(window._fbOK){
      try{
        const{doc,getDoc}=window._fb;
        const snap=await getDoc(doc(window._db,'projects',pid));
        if(snap.exists()){
          const d=await aesDec(snap.data().data,cryptoKey);
          if(d===null){showErr("❌ Code d'accès incorrect pour ce projet.");btn.textContent='Accéder →';btn.disabled=false;return;}
          STATE=d;
        }
      }catch{}
    }
    SES={cryptoKey,username:name,projectId:pid};
    showPage('portfolio-page');
    document.getElementById('pf-proj').textContent='Projet : '+pid;
    document.getElementById('pf-user').textContent='Connecté : '+name;
    startListener();startPresence();
    if(!window._fbOK)setSync('local','pf-sync');
    renderPortfolio();
    toast('✓ Bienvenue '+name+' !');
  }catch(e){showErr('Erreur : '+e.message);}
  btn.textContent='Accéder →';btn.disabled=false;
}
function showErr(m){const e=document.getElementById('l-err');e.textContent=m;e.style.display='block';}
function logout(){
  if(fbUnsub)fbUnsub();clearInterval(presIv);clearInterval(onIv);
  SES=null;curId=null;showPage('login-page');
}

  // Global KPIs

    const spent=p.phases.reduce((s,x)=>s+x.spent,0);
    const done=p.phases.filter(x=>x.status==='done').length;
    const pct=p.phases.length>0?Math.round(done/p.phases.length*100):0;

      <div class="pc-stats">
        <div><div class="pcs-l">Achat</div><div class="pcs-v" style="color:${p.info.color}">${fmt(p.info.purchasePrice)}</div></div>

        <div><div class="pcs-l">Imprévus</div><div class="pcs-v" style="color:${impact>0?'#e74c3c':'#555'}">${fmt(impact)}</div></div>

function saveProp(id){
  const info={name:document.getElementById('f-name').value.trim(),address:document.getElementById('f-addr').value.trim(),type:document.getElementById('f-type').value,surface:parseFloat(document.getElementById('f-surf').value)||0,purchasePrice:parseFloat(document.getElementById('f-price').value)||0,targetRent:parseFloat(document.getElementById('f-rent').value)||0,status:document.getElementById('f-status').value,color:document.getElementById('f-color').value};
  if(!info.name){alert('Le nom est requis.');return;}
  if(id&&STATE.properties[id]){
    STATE.properties[id].info=info;
    if(curId===id){document.getElementById('d-name').textContent=info.name;document.getElementById('d-addr').textContent=info.address;}
    toast('Bien modifié ✓');
  }else{
    const nid=Date.now();
    STATE.properties[nid]={id:nid,info,phases:[],materials:[],artisans:[],events:[],activityLog:[]};
    toast('Nouveau bien créé ✓');
  }
  closeMod();renderPortfolio();scheduleSave();
}
function delProp(id){
  const p=STATE.properties[id];
  if(!confirm(`Supprimer "${p?.info?.name}" et toutes ses données ?`))return;
  delete STATE.properties[id];
  renderPortfolio();scheduleSave();toast('Bien supprimé');
}

// ═══ PLANNING ════════════════════════════════════════════
function rPlanning(el){
  const p=P();if(!p)return;
  const phases=p.phases;
  if(!phases.length){el.innerHTML='<div class="empty" style="margin-top:40px">Ajoutez des phases dans "Travaux" d\'abord.</div>';return;}
  const allD=phases.flatMap(x=>[new Date(x.startDate),new Date(x.endDate)]);
  const minD=new Date(Math.min(...allD)),maxD=new Date(Math.max(...allD));
  const total=Math.ceil((maxD-minD)/86400000)+1;
  const pct=d=>Math.max(0,Math.min(100,(new Date(d)-minD)/(total*86400000)*100));
  const tp=pct(new Date());
  const months=[];const c=new Date(minD.getFullYear(),minD.getMonth(),1);
  while(c<=maxD){months.push(new Date(c));c.setMonth(c.getMonth()+1);}
  el.innerHTML=`
  <h3 style="color:var(--t1);font-family:'Playfair Display',serif;font-size:20px;margin-bottom:14px">Planning Gantt</h3>
  <div class="card" style="padding:16px"><div class="gw">
    <div class="gmonths">${months.map(m=>{const s=Math.max(0,pct(m));const w=Math.min(100,pct(new Date(m.getFullYear(),m.getMonth()+1,1)))-s;return`<div class="gmonth" style="width:${w}%">${m.toLocaleDateString('fr-FR',{month:'short',year:'2-digit'})}</div>`;}).join('')}</div>
    ${phases.map(x=>`
      <div class="grow">
        <div class="glbl"><div style="color:var(--t2);font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${x.name}</div><div style="color:${SC[x.status]};font-size:10px">${SL[x.status]}</div></div>
        <div class="gtrack">${tp>=0&&tp<=100?`<div class="gtoday" style="left:${tp}%"></div>`:''}<div class="gbar" style="left:${pct(x.startDate)}%;width:${Math.max(1,pct(x.endDate)-pct(x.startDate))}%;background:${x.color}bb;${x.status==='in_progress'?`border:2px solid ${x.color}`:''}"></div></div>
      </div>`).join('')}
    <div style="display:flex;gap:14px;margin-top:10px;margin-left:150px;flex-wrap:wrap">

  </div>
  <div class="card" style="padding:0;overflow:hidden">
    <div style="background:var(--bg3);padding:10px 14px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between"><span style="color:var(--t4);font-size:10px;font-weight:700;text-transform:uppercase">Poste</span><div style="display:flex;gap:16px"><span style="color:var(--t4);font-size:10px;font-weight:700;text-transform:uppercase;min-width:70px;text-align:right">Prévu</span><span style="color:var(--t4);font-size:10px;font-weight:700;text-transform:uppercase;min-width:70px;text-align:right">Réel</span></div></div>

        </div>
        <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
          ${e.impact>0?tag('+'+fmt(e.impact),'#e74c3c'):''}${tag(EL[e.type],EC[e.type])}
          <button class="btn-g" style="font-size:11px;padding:4px 8px;color:${e.resolved?'#2ecc71':'var(--t3)'}" onclick="toggleEvt(${e.id})">${e.resolved?'✓ Résolu':'Résoudre'}</button>
          <button class="btn-g" style="font-size:11px;padding:4px 7px" onclick="openEvtModal(${e.id})">✎</button>
          <button class="btn-d" style="font-size:11px;padding:4px 6px" onclick="delItem('events',${e.id})">✕</button>
        </div>
      </div>
    </div>`;}).join('')}
  ${p.events.length===0?'<div class="empty" style="margin-top:30px">Aucun événement enregistré</div>':''}`;
}
function openEvtModal(id){
  const p=P();if(!p)return;
  const e=id?p.events.find(x=>x.id===id):null;
  const f=e?{...e}:{title:'',date:'',type:'planned',description:'',impact:0,phaseId:'',resolved:false};
  document.getElementById('mtitle').textContent=id?"Modifier l'événement":'Nouvel événement';
  document.getElementById('mbody').innerHTML=`
    <div class="field"><label>Titre</label><input class="inp" id="f-title" value="${f.title}" placeholder="ex: Fuite découverte"></div>
    <div class="g2"><div class="field"><label>Date</label><input class="inp" id="f-date" type="date" value="${f.date}"></div><div class="field"><label>Type</label><select class="inp" id="f-type">${Object.entries(EL).map(([k,v])=>`<option value="${k}" ${f.type===k?'selected':''}>${v}</option>`).join('')}</select></div></div>
    <div class="g2"><div class="field"><label>Phase</label><select class="inp" id="f-ph"><option value="">—</option>${p.phases.map(x=>`<option value="${x.id}" ${f.phaseId===x.id?'selected':''}>${x.name}</option>`).join('')}</select></div><div class="field"><label>Impact (€)</label><input class="inp" id="f-imp" type="number" value="${f.impact}"></div></div>
    <div class="field"><label>Description</label><textarea class="inp" id="f-desc">${f.description||''}</textarea></div>
    <div class="field" style="display:flex;align-items:center;gap:10px"><input type="checkbox" id="f-res" ${f.resolved?'checked':''} style="accent-color:var(--green);width:16px;height:16px"><label for="f-res" style="color:var(--t3);font-size:13px;text-transform:none;letter-spacing:0;font-weight:400">Marquer comme résolu</label></div>
    <button class="btn btn-full" onclick="saveEvt(${id||0})">Enregistrer</button>`;
  openMod();
}
function saveEvt(id){
  const p=P();if(!p)return;
  const item={title:document.getElementById('f-title').value.trim(),date:document.getElementById('f-date').value,type:document.getElementById('f-type').value,phaseId:parseInt(document.getElementById('f-ph').value)||null,impact:parseFloat(document.getElementById('f-imp').value)||0,description:document.getElementById('f-desc').value.trim(),resolved:document.getElementById('f-res').checked};
  if(id){p.events=p.events.map(e=>e.id===id?{...item,id}:e);addLog(`a modifié "${item.title}"`);}
  else{p.events.push({...item,id:Date.now()});addLog(`a ajouté "${item.title}"`);}
  closeMod();renderTab('events');scheduleSave();toast('Enregistré ✓');
}
function toggleEvt(id){
  const p=P();if(!p)return;
  const e=p.events.find(x=>x.id===id);
  p.events=p.events.map(x=>x.id===id?{...x,resolved:!x.resolved}:x);
  addLog(`a ${e.resolved?'rouvert':'résolu'} "${e.title}"`);
  renderTab('events');scheduleSave();
}

// ═══ GENERIC DELETE ═══════════════════════════════════════
function delItem(col,id){
  const p=P();if(!p)return;
  const item=p[col].find(x=>x.id===id);
  const name=item?.name||item?.title||'?';
  if(!confirm(`Supprimer "${name}" ?`))return;
  p[col]=p[col].filter(x=>x.id!==id);
  addLog(`a supprimé "${name}"`);
  renderTab(curTab);scheduleSave();toast('Supprimé');
}

// ═══ MODAL ═══════════════════════════════════════════════
function openMod(){document.getElementById('mov').classList.add('on');}
function closeMod(e){if(e&&e.target!==document.getElementById('mov'))return;document.getElementById('mov').classList.remove('on');}

// ═══ TOAST ═══════════════════════════════════════════════
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),2200);}

// ═══ SERVICE WORKER ═══════════════════════════════════════
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
</body>
</html>
